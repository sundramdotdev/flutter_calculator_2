name: calculator
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  freezed_annotation: 2.4.4
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  equatable: ^2.0.8
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  share_plus: ^12.0.2
  google_fonts: ^8.1.0
  decimal: ^3.2.4
  intl: ^0.19.0
  rational: ^2.2.3
  shared_preferences: ^2.2.3
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: 2.3.3
  build_resolvers: 2.2.0
  isar_generator: ^3.1.0+1
  freezed: 2.4.5

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/cal_logo.png"

dependency_overrides:
  analyzer: '>=5.12.0 <6.0.0'
  frontend_server_client: '^4.0.0'
